services:
  mongo:
    image: mongo:7
    container_name: restaurant-app-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    container_name: restaurant-app-server
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: "3101"
      UPLOAD_PATH: /app/uploads
      MONGODB_URI: mongodb://mongo:27017/restaurant_app
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5175}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-none}
    ports:
      - "3101:3101"
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/logs:/app/logs

  web:
    container_name: restaurant-app-web
    env_file:
      - ./.env
    build:
      context: .
      dockerfile: ./web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL must be set in root .env}
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5175:5175"

volumes:
  mongo_data:
